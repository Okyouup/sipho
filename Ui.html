<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aegis-1 · Cognitive AI</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;600;800&display=swap');

  :root {
    --bg:        #09090f;
    --surface:   #111118;
    --border:    #1e1e2e;
    --accent:    #7c6aff;
    --accent2:   #00d4aa;
    --danger:    #ff4d6d;
    --text:      #e8e8f0;
    --muted:     #6b6b80;
    --mono:      'Space Mono', monospace;
    --sans:      'Syne', sans-serif;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    height: 100vh;
    display: grid;
    grid-template-rows: auto 1fr auto;
    grid-template-columns: 260px 1fr;
    grid-template-areas:
      "header header"
      "sidebar main"
      "sidebar input";
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    grid-area: header;
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
  }

  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 10px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
  }

  .logo-text {
    font-size: 20px;
    font-weight: 800;
    letter-spacing: -0.5px;
  }

  .logo-text span { color: var(--accent); }

  .header-right {
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    transition: background 0.3s;
  }
  .status-dot.online { background: var(--accent2); box-shadow: 0 0 8px var(--accent2); }

  .status-label {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 1px;
  }

  /* ── Sidebar ── */
  aside {
    grid-area: sidebar;
    border-right: 1px solid var(--border);
    padding: 20px 16px;
    display: flex;
    flex-direction: column;
    gap: 24px;
    overflow-y: auto;
    background: var(--surface);
  }

  .sidebar-section h3 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 12px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 6px 0;
    font-size: 13px;
    border-bottom: 1px solid var(--border);
  }

  .stat-row:last-child { border-bottom: none; }

  .stat-label { color: var(--muted); font-size: 12px; }
  .stat-value {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--accent2);
    font-weight: 700;
  }

  .sidebar-btn {
    width: 100%;
    padding: 9px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 12px;
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    margin-bottom: 6px;
  }
  .sidebar-btn:hover { border-color: var(--accent); color: var(--accent); }
  .sidebar-btn.danger:hover { border-color: var(--danger); color: var(--danger); }

  .fact-input-wrap { display: flex; flex-direction: column; gap: 6px; }
  .fact-input-wrap input, .fact-input-wrap select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: var(--mono);
    font-size: 11px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .fact-input-wrap input:focus, .fact-input-wrap select:focus {
    border-color: var(--accent);
  }

  /* ── Chat area ── */
  main {
    grid-area: main;
    overflow-y: auto;
    padding: 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
    scroll-behavior: smooth;
  }

  .message {
    display: flex;
    flex-direction: column;
    gap: 6px;
    max-width: 780px;
    animation: fadeUp 0.25s ease;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .message.user { align-self: flex-end; align-items: flex-end; }
  .message.aegis { align-self: flex-start; align-items: flex-start; }

  .bubble {
    padding: 14px 18px;
    border-radius: 16px;
    font-size: 14px;
    line-height: 1.7;
    max-width: 640px;
  }

  .user .bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }

  .aegis .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    border-bottom-left-radius: 4px;
  }

  .telemetry {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    font-family: var(--mono);
    font-size: 10px;
  }

  .tag {
    padding: 3px 8px;
    border-radius: 4px;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--muted);
  }
  .tag.valid   { border-color: var(--accent2); color: var(--accent2); }
  .tag.invalid { border-color: var(--danger);  color: var(--danger); }
  .tag.route   { border-color: var(--accent);  color: var(--accent); }

  .conflict-box {
    background: rgba(255, 77, 109, 0.08);
    border: 1px solid rgba(255, 77, 109, 0.3);
    border-radius: 8px;
    padding: 10px 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--danger);
    max-width: 640px;
  }

  .typing {
    display: flex;
    gap: 5px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    border-bottom-left-radius: 4px;
    width: fit-content;
  }
  .typing span {
    width: 6px; height: 6px;
    background: var(--muted);
    border-radius: 50%;
    animation: blink 1.2s infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink {
    0%, 80%, 100% { opacity: 0.3; transform: scale(0.8); }
    40%           { opacity: 1;   transform: scale(1.1); }
  }

  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
  }
  .empty-state .big { font-size: 48px; margin-bottom: 16px; }
  .empty-state h2 { font-size: 22px; font-weight: 800; color: var(--text); margin-bottom: 8px; }
  .empty-state p  { font-size: 14px; line-height: 1.6; max-width: 380px; }

  /* ── Input ── */
  .input-area {
    grid-area: input;
    padding: 16px 24px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg);
  }

  .input-wrap {
    display: flex;
    gap: 10px;
    align-items: flex-end;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 12px 14px;
    transition: border-color 0.15s;
  }
  .input-wrap:focus-within { border-color: var(--accent); }

  #messageInput {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: var(--sans);
    font-size: 14px;
    resize: none;
    max-height: 120px;
    line-height: 1.5;
  }
  #messageInput::placeholder { color: var(--muted); }

  .send-btn {
    width: 36px; height: 36px;
    background: var(--accent);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .send-btn:hover { background: #9380ff; transform: scale(1.05); }
  .send-btn:disabled { background: var(--border); cursor: not-allowed; transform: none; }
  .send-btn svg { width: 16px; height: 16px; fill: white; }

  .input-hint {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--muted);
    margin-top: 8px;
    padding-left: 4px;
  }

  ::-webkit-scrollbar { width: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="logo">🧠</div>
  <div class="logo-text">Aegis<span>-1</span></div>
  <div class="header-right">
    <div class="status-dot" id="statusDot"></div>
    <div class="status-label" id="statusLabel">CONNECTING</div>
  </div>
</header>

<aside>
  <div class="sidebar-section">
    <h3>System Stats</h3>
    <div class="stat-row"><span class="stat-label">Turns</span><span class="stat-value" id="statTurns">—</span></div>
    <div class="stat-row"><span class="stat-label">Memory hits</span><span class="stat-value" id="statMem">—</span></div>
    <div class="stat-row"><span class="stat-label">Facts loaded</span><span class="stat-value" id="statFacts">—</span></div>
    <div class="stat-row"><span class="stat-label">OBS sync</span><span class="stat-value" id="statObs">—</span></div>
    <div class="stat-row"><span class="stat-label">Boot time</span><span class="stat-value" id="statBoot">—</span></div>
  </div>

  <div class="sidebar-section">
    <h3>Memory</h3>
    <button class="sidebar-btn" onclick="sleepMemory()">💾 Consolidate memory</button>
    <button class="sidebar-btn danger" onclick="resetConversation()">🔄 Reset conversation</button>
  </div>

  <div class="sidebar-section">
    <h3>Load a Fact</h3>
    <div class="fact-input-wrap">
      <input id="factText" type="text" placeholder="Enter a ground-truth fact...">
      <select id="factCategory">
        <option value="general">general</option>
        <option value="geography">geography</option>
        <option value="technology">technology</option>
        <option value="physics">physics</option>
        <option value="medicine">medicine</option>
        <option value="finance">finance</option>
        <option value="legal">legal</option>
      </select>
      <button class="sidebar-btn" onclick="loadFact()">+ Load fact</button>
    </div>
  </div>
</aside>

<main id="chat">
  <div class="empty-state" id="emptyState">
    <div class="big">🧠</div>
    <h2>Aegis-1 is ready</h2>
    <p>Neuromorphic cognitive AI with persistent memory, conflict detection, and confidence scoring.</p>
  </div>
</main>

<div class="input-area">
  <div class="input-wrap">
    <textarea id="messageInput" rows="1" placeholder="Ask Aegis-1 anything..." onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
    </button>
  </div>
  <div class="input-hint">Enter to send · Shift+Enter for new line</div>
</div>

<script>
const API = '';  // same origin
let turnCount = 0;

// ── Health check on load ──────────────────────────────────────────────────────
async function checkHealth() {
  try {
    const r = await fetch(`${API}/health`);
    const d = await r.json();
    document.getElementById('statusDot').classList.add('online');
    document.getElementById('statusLabel').textContent = 'ONLINE';
    document.getElementById('statFacts').textContent = d.memory_facts ?? '—';
    document.getElementById('statBoot').textContent = d.boot_ms ? `${Math.round(d.boot_ms)}ms` : '—';
    document.getElementById('statObs').textContent = d.obs_connected ? '✓ OBS' : 'local';
  } catch {
    document.getElementById('statusLabel').textContent = 'OFFLINE';
  }
}

checkHealth();
setInterval(checkHealth, 30000);

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('messageInput');
  const text = input.value.trim();
  if (!text) return;

  document.getElementById('emptyState')?.remove();
  input.value = '';
  autoResize(input);
  document.getElementById('sendBtn').disabled = true;

  appendMessage('user', text);
  const typingEl = appendTyping();

  try {
    const r = await fetch(`${API}/chat`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: text }),
    });
    const d = await r.json();
    typingEl.remove();
    turnCount++;
    document.getElementById('statTurns').textContent = turnCount;
    document.getElementById('statMem').textContent = d.memory_hits ?? '—';
    appendAegisMessage(d);
  } catch (e) {
    typingEl.remove();
    appendMessage('aegis', `❌ Error: ${e.message}`);
  }

  document.getElementById('sendBtn').disabled = false;
  input.focus();
}

function appendMessage(role, text) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = `message ${role}`;
  msg.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

function appendAegisMessage(d) {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'message aegis';

  const validClass = d.validation_passed ? 'valid' : 'invalid';
  const validLabel = d.validation_passed ? '✅ valid' : '⚠️ conflict';
  const rethinkTag = d.rethink_attempts > 0
    ? `<span class="tag">rethinks=${d.rethink_attempts}</span>` : '';
  const memTag = d.memory_hits > 0
    ? `<span class="tag">mem=${d.memory_hits}</span>` : '';

  let conflictsHtml = '';
  if (d.conflicts && d.conflicts.length > 0) {
    const c = d.conflicts[0];
    conflictsHtml = `
      <div class="conflict-box">
        ⚠️ Conflict detected [${c.severity}]<br>
        Claim: "${escHtml(c.claim)}"<br>
        vs fact: "${escHtml(c.stored_fact)}"
      </div>`;
  }

  msg.innerHTML = `
    <div class="bubble">${escHtml(d.text)}</div>
    <div class="telemetry">
      <span class="tag route">${d.route}</span>
      <span class="tag ${validClass}">${validLabel}</span>
      <span class="tag">confidence ${Math.round(d.confidence * 100)}%</span>
      <span class="tag">${d.latency_ms}ms</span>
      ${rethinkTag}${memTag}
    </div>
    ${conflictsHtml}
  `;

  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

function appendTyping() {
  const chat = document.getElementById('chat');
  const msg = document.createElement('div');
  msg.className = 'message aegis';
  msg.innerHTML = `<div class="typing"><span></span><span></span><span></span></div>`;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
  return msg;
}

// ── Sidebar actions ───────────────────────────────────────────────────────────
async function sleepMemory() {
  try {
    const r = await fetch(`${API}/sleep`, { method: 'POST' });
    const d = await r.json();
    const obsMsg = d.obs_synced ? ' + synced to Huawei OBS' : '';
    alert(`✅ Memory consolidated${obsMsg}`);
  } catch (e) { alert(`❌ ${e.message}`); }
}

async function resetConversation() {
  if (!confirm('Reset conversation history? Long-term memory is kept.')) return;
  try {
    await fetch(`${API}/reset`, { method: 'POST' });
    document.getElementById('chat').innerHTML =
      '<div class="empty-state" id="emptyState"><div class="big">🧠</div><h2>Conversation reset</h2><p>Long-term memory is intact.</p></div>';
    turnCount = 0;
    document.getElementById('statTurns').textContent = '0';
  } catch (e) { alert(`❌ ${e.message}`); }
}

async function loadFact() {
  const fact = document.getElementById('factText').value.trim();
  const category = document.getElementById('factCategory').value;
  if (!fact) return alert('Enter a fact first.');
  try {
    await fetch(`${API}/facts`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ fact, category }),
    });
    document.getElementById('factText').value = '';
    alert(`✅ Fact loaded: [${category}] ${fact}`);
    checkHealth();
  } catch (e) { alert(`❌ ${e.message}`); }
}

// ── Utilities ─────────────────────────────────────────────────────────────────
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;')
    .replace(/\n/g,'<br>');
}
</script>
</body>
</html>
